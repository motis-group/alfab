name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  RELEASE_ID: ${{ github.sha }}
  DEPLOY_DOMAIN: www.alfabvic.com.au
  ALT_DEPLOY_DOMAIN: alfabvic.com.au
  RELEASES_DIR: /opt/alfab/releases
  CURRENT_LINK: /opt/alfab/current
  KEEP_RELEASES: 5

jobs:
  deploy:
    if: ${{ secrets.DO_DEPLOY_HOST != '' && secrets.DO_DEPLOY_USER != '' && secrets.DO_DEPLOY_SSH_KEY != '' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.alfabvic.com.au

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DO_DEPLOY_HOST }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DO_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [[ -n "${DEPLOY_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${DEPLOY_HOST}" > ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: Package release
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.next' \
            --exclude='node_modules' \
            --exclude='tsconfig.tsbuildinfo' \
            -czf "/tmp/alfab-${RELEASE_ID}.tgz" .

      - name: Upload release artifact
        env:
          DEPLOY_HOST: ${{ secrets.DO_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DO_DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DO_DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail
          scp -P "${DEPLOY_PORT}" "/tmp/alfab-${RELEASE_ID}.tgz" "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/alfab-${RELEASE_ID}.tgz"

      - name: Deploy release on Droplet
        env:
          DEPLOY_HOST: ${{ secrets.DO_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DO_DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DO_DEPLOY_PORT || '22' }}
        run: |
          set -euo pipefail

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail
            release_dir='${RELEASES_DIR}/${RELEASE_ID}'
            mkdir -p '${RELEASES_DIR}'
            rm -rf \"\${release_dir}\"
            mkdir -p \"\${release_dir}\"
            tar -xzf '/tmp/alfab-${RELEASE_ID}.tgz' -C \"\${release_dir}\"
            rm -f '/tmp/alfab-${RELEASE_ID}.tgz'
            cd \"\${release_dir}\"
            RELEASE_DIR=\"\${release_dir}\" CURRENT_LINK='${CURRENT_LINK}' RELEASES_DIR='${RELEASES_DIR}' KEEP_RELEASES='${KEEP_RELEASES}' DEPLOY_DOMAIN='${DEPLOY_DOMAIN}' ALT_DEPLOY_DOMAIN='${ALT_DEPLOY_DOMAIN}' bash scripts/remote-release-deploy.sh"

      - name: Smoke test production login
        run: |
          set -euo pipefail

          sleep 10

          curl -fsS -D /tmp/prod-login.headers -o /tmp/prod-login.html --max-time 20 "https://${DEPLOY_DOMAIN}/login"
          grep -qi '^HTTP/.* 200' /tmp/prod-login.headers
          grep -qi '<form' /tmp/prod-login.html
